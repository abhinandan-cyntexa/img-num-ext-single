<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Image + Number Single Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Roboto+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=0.7.0">
  <script src="vendor/tableau.extensions.1.latest.js"></script>
</head>
<body>
  <main class="extension-root" aria-live="polite">
    <aside class="status-panel" id="statusPanel" data-status="loading" aria-live="polite" hidden>
      <div class="status-heading">
        <span class="status-dot" aria-hidden="true"></span>
        <span id="statusLabel">Initializing</span>
      </div>
      <div class="status-detail" id="statusDetail">Connecting to Tableau...</div>
      <dl class="mapping-list">
        <div>
          <dt>Image URL</dt>
          <dd id="imageMapping">Not mapped</dd>
        </div>
        <div>
          <dt>Value</dt>
          <dd id="valueMapping">Not mapped</dd>
        </div>
      </dl>
    </aside>

    <section class="single-card" aria-label="Image and number card">
      <span class="card-rail" aria-hidden="true"></span>
      <span class="card-grid" aria-hidden="true"></span>

      <div class="card-inner">
        <div class="image-frame" id="imageFrame">
          <img id="cardImage" class="card-image" alt="" hidden>
          <div id="imagePlaceholder" class="image-placeholder" aria-hidden="true">
            <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" role="img" focusable="false">
              <circle cx="18" cy="18" r="6"></circle>
              <circle cx="32" cy="20" r="5"></circle>
              <path d="M8 38c1-6 5-9 10-9s9 3 10 9"></path>
              <path d="M26 38c1-5 4-7 7-7s6 2 7 7"></path>
            </svg>
          </div>
        </div>
        <div id="cardValue" class="card-value">--</div>
      </div>
    </section>

    <div id="error" class="error" role="status"></div>
  </main>
  <script src="chart.js?v=0.7.0"></script>
</body>
</html>
