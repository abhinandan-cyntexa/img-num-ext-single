<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Image + Number Single Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=0.7.0">
  <script src="vendor/tableau.extensions.1.latest.js"></script>
</head>
<body>
  <main class="extension-root" aria-live="polite">
    <aside class="status-panel" id="statusPanel" data-status="loading" aria-live="polite">
      <div class="status-heading">
        <span class="status-dot" aria-hidden="true"></span>
        <span id="statusLabel">Initializing</span>
      </div>
      <div class="status-detail" id="statusDetail">Connecting to Tableau...</div>
      <dl class="mapping-list">
        <div>
          <dt>Image URL</dt>
          <dd id="imageMapping">Not mapped</dd>
        </div>
        <div>
          <dt>Value</dt>
          <dd id="valueMapping">Not mapped</dd>
        </div>
      </dl>
    </aside>
    <section class="single-card" aria-label="Image and number card">
      <div class="image-frame" id="imageFrame">
        <img id="cardImage" class="card-image" alt="" hidden>
        <div id="imagePlaceholder" class="image-placeholder" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" focusable="false">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </div>
      </div>
      <div id="cardValue" class="card-value">--</div>
    </section>
    <div id="error" class="error" role="status"></div>
  </main>
  <script src="chart.js?v=0.7.0"></script>
</body>
</html>
