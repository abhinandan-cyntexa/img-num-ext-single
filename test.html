<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Image + Number Single Card Test</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="extension-root" aria-live="polite">
    <section class="single-card" aria-label="Image and number card">
      <div class="image-frame" id="imageFrame">
        <img id="cardImage" class="card-image" alt="" hidden>
        <div id="imagePlaceholder" class="image-placeholder" aria-hidden="true">
          <svg viewBox="0 0 96 96" role="img" focusable="false">
            <circle cx="34" cy="34" r="12"></circle>
            <circle cx="62" cy="34" r="12"></circle>
            <circle cx="48" cy="30" r="14"></circle>
            <path d="M17 68c3-15 14-23 31-23s28 8 31 23c-8 7-18 11-31 11s-23-4-31-11z"></path>
          </svg>
        </div>
      </div>
      <div id="cardValue" class="card-value">--</div>
    </section>
    <div id="error" class="error" role="status"></div>
  </main>

  <script>
    window.tableau = {
      TableauEventType: {
        SummaryDataChanged: 'SummaryDataChanged',
      },
      extensions: {
        initializeAsync: async () => {},
        worksheetContent: {
          worksheet: {
            addEventListener: () => {},
            getVisualSpecificationAsync: async () => ({
              marksSpecificationCollection: [{
                encodingCollection: [
                  { id: 'image', fieldCollection: [{ fieldName: 'Image URL' }] },
                  { id: 'value', fieldCollection: [{ fieldName: 'Member Count' }] },
                ],
              }],
            }),
            getSummaryDataReaderAsync: async () => ({
              getAllPagesAsync: async () => ({
                columns: [
                  { fieldName: 'Image URL', index: 0 },
                  { fieldName: 'Member Count', index: 1 },
                ],
                data: [[
                  {
                    value: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96"%3E%3Cg fill="%23000"%3E%3Ccircle cx="34" cy="34" r="12"/%3E%3Ccircle cx="62" cy="34" r="12"/%3E%3Ccircle cx="48" cy="30" r="14"/%3E%3Cpath d="M17 68c3-15 14-23 31-23s28 8 31 23c-8 7-18 11-31 11s-23-4-31-11z"/%3E%3C/g%3E%3C/svg%3E',
                  },
                  { value: '1223661' },
                ]],
              }),
              releaseAsync: async () => {},
            }),
          },
        },
      },
    };
  </script>
  <script src="chart.js"></script>
</body>
</html>
